{% extends 'segmentation/base.html' %}
{% load static %}

{% block title %}Contact | NeuroDetect AI{% endblock %}

{% block content %}
<main class="content-section">
    <div class="glass-panel text-content" style="max-width: 600px; margin: 4rem auto; padding: 3rem;">
        <h2>Contact Us</h2>
        <p>Interested in our research, have questions about the model, or want to collaborate? We'd love to hear from you.</p>
        
        <form style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
            <div>
                <label for="name" style="display: block; margin-bottom: 0.5rem;">Name</label>
                <input type="text" id="name" name="name" class="glass-input" placeholder="Your Name" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white;">
            </div>
            <div>
                <label for="email" style="display: block; margin-bottom: 0.5rem;">Email</label>
                <input type="email" id="email" name="email" class="glass-input" placeholder="your.email@example.com" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white;">
            </div>
            <div>
                <label for="message" style="display: block; margin-bottom: 0.5rem;">Message</label>
                <textarea id="message" name="message" rows="5" class="glass-input" placeholder="How can we help?" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white;"></textarea>
            </div>
            <button type="button" class="btn-primary" style="margin-top: 1rem;">Send Message</button>
        </form>
    </div>
</main>
{% endblock %}
